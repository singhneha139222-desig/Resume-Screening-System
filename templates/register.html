{% extends "base.html" %}
{% block content %}
<div class="flex-grow flex items-center justify-center py-10">
    <div class="glass-panel w-full max-w-md p-8 rounded-2xl animate-fade-in shadow-2xl border border-gray-800">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white mb-2">Create an Account</h2>
            <p class="text-gray-400 text-sm">Join the next-gen AI Resume Screening platform.</p>
        </div>
        
        <form method="POST" action="/register" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-400 mb-1">Full Name</label>
                <input type="text" name="username" id="username" required
                    class="w-full bg-gray-900/50 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-brandBlue focus:ring-1 focus:ring-brandBlue transition"
                    placeholder="John Doe">
            </div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-400 mb-1">Email Address</label>
                <input type="email" name="email" id="email" required
                    class="w-full bg-gray-900/50 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-brandBlue focus:ring-1 focus:ring-brandBlue transition"
                    placeholder="john@example.com">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input type="password" name="password" id="password" required
                    class="w-full bg-gray-900/50 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-brandBlue focus:ring-1 focus:ring-brandBlue transition"
                    placeholder="••••••••">
            </div>
            
            <button type="submit" 
                class="w-full bg-gradient-to-r from-brandBlue to-brandIndigo hover:from-blue-500 hover:to-indigo-500 text-white font-medium py-3 rounded-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5">
                Sign Up
            </button>
        </form>
        
        <div class="mt-6 border-t border-gray-800 pt-6 text-center">
            <p class="text-gray-400 text-sm">Already have an account? 
                <a href="/login" class="text-brandBlue hover:text-blue-400 font-medium transition">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
